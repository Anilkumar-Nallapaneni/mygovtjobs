name: Fetch official RSS

on:
  workflow_dispatch:
  schedule:
    # Refresh the Official Wire & Notices snapshot every 4 hours.
    - cron: "30 */4 * * *"

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
        working-directory: frontend

      - run: node ../scripts/fetch-official-feeds.mjs
        working-directory: frontend

      - name: Commit snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add frontend/public/data/official-feed-items.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore(data): refresh official RSS snapshot"
            git push
          fi
